name: Build Android APK
on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Public HTTPS chat URL
        required: true
        default: https://chat.example.com
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: npm install
      - name: Configure server URL
        run: |
          node -e "const fs=require('fs');const c=require('./capacitor.config.json');const u=process.env.APP_URL;c.server.url=u;c.server.allowNavigation=[new URL(u).hostname];fs.writeFileSync('capacitor.config.json',JSON.stringify(c,null,2))"
        env:
          APP_URL: ${{ inputs.app_url }}
      - run: npx cap add android
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: ConnectChat-Pro-Android
          path: clients/android/android/app/build/outputs/apk/debug/app-debug.apk
