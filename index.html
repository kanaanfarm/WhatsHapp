<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#182132">
  <title>ConnectChat Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <section id="authView" class="auth-view">
    <div class="auth-card">
      <div class="logo">C</div>
      <h1>ConnectChat Pro</h1>
      <p>Private messaging for mobile and PC.</p>

      <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Register</button>
      </div>

      <input id="authUsername" placeholder="Username" maxlength="30" autocomplete="username">
      <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
      <button id="authSubmit" class="primary">Login</button>
      <div id="authError" class="error"></div>
    </div>
  </section>

  <section id="appView" class="app hidden">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="logo small">C</div>
        <div>
          <strong>ConnectChat</strong>
          <span id="meName"></span>
        </div>
      </div>

      <div class="search-box">
        <input id="userSearch" placeholder="Search users">
      </div>

      <div class="section-label">Conversations</div>
      <div id="usersList" class="users-list"></div>

      <div class="sidebar-actions">
        <button id="installBtn" class="install-btn hidden">Install app</button>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </div>
    </aside>

    <main id="chatPanel" class="chat">
      <header class="chat-head">
        <button id="backBtn" class="back-btn">←</button>
        <div class="active-avatar" id="activeAvatar">?</div>
        <div>
          <h2 id="chatName">Select a user</h2>
          <span id="chatStatus">Start a private conversation</span>
        </div>
        <div class="call-actions">
          <button id="audioCallBtn" class="header-btn" title="Audio call" disabled>☎</button>
          <button id="videoCallBtn" class="header-btn" title="Video call" disabled>📹</button>
        </div>
      </header>

      <div id="messages" class="messages empty-state">
        <div>
          <h3>Your messages</h3>
          <p>Select a user to start chatting.</p>
        </div>
      </div>

      <div id="typingText" class="typing"></div>
      <div id="uploadStatus" class="upload-status hidden">Uploading…</div>

      <footer class="composer">
        <input id="fileInput" type="file" accept="image/*,audio/*,application/pdf" hidden>
        <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>

        <button id="attachBtn" class="circle-btn" title="Attach photo or file">＋</button>
        <button id="cameraBtn" class="circle-btn" title="Take photo">📷</button>
        <input id="messageInput" placeholder="Type or paste a photo..." disabled>
        <button id="recordBtn" class="circle-btn record-btn" title="Record voice">🎤</button>
        <button id="sendBtn" class="send-btn" disabled>Send</button>
      </footer>
    </main>
  </section>

  <div id="toast" class="toast hidden"></div>

  <section id="callOverlay" class="call-overlay hidden">
    <div class="call-card">
      <div class="call-title">
        <div>
          <h2 id="callName">Call</h2>
          <span id="callStatus">Connecting…</span>
        </div>
      </div>
      <div id="videoStage" class="video-stage">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
      </div>
      <div class="call-controls">
        <button id="acceptCallBtn" class="accept-call hidden">Accept</button>
        <button id="declineCallBtn" class="decline-call hidden">Decline</button>
        <button id="muteBtn" class="call-control hidden">🎤 Mute</button>
        <button id="cameraToggleBtn" class="call-control hidden">📹 Camera</button>
        <button id="endCallBtn" class="end-call hidden">End call</button>
      </div>
    </div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js?v=8"></script>
</body>
</html>
